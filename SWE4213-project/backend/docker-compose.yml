services:
  book-service:
    build: ./book-service
    ports:
      - "3002:3002"
    environment:
      DB_HOST: book-db
      DB_PORT: 5432
      DB_NAME: bookdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      book-db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  book-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - book-data:/var/lib/postgresql/data
      - ./book-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  book-data: